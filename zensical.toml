[project]
site_name = "NERB Documentation"
site_description = "Validated named-entity banks, Rust-backed extraction, CLI, Python API, and MCP server documentation."
site_author = "Johnny Greco"
site_url = "https://johnnygreco.dev/nerb/"
repo_url = "https://github.com/johnnygreco/nerb"
repo_name = "johnnygreco/nerb"
edit_uri = "edit/main/docs/"
docs_dir = "docs"
site_dir = "site"
copyright = "Copyright &copy; 2026 Johnny Greco"
extra_css = ["stylesheets/extra.css"]

nav = [
  { "Start" = [
    { "Overview" = "index.md" },
    { "Quickstart" = "quickstart.md" },
  ] },
  { "Guides" = [
    { "Workflows" = "workflows.md" },
    { "Anonymization" = "anonymization.md" },
    { "Performance" = "performance.md" },
    { "Enron v2 Charter" = "enron-benchmark.md" },
    { "Enron v2 Preparation" = "enron-preparation.md" },
    { "Enron v2 Splits" = "enron-splits.md" },
    { "Enron v2 Bank Construction" = "enron-bank-building.md" },
    { "Enron v2 Evaluation" = "enron-evaluation.md" },
    { "Enron v2 Autoresearch Policy" = "autoresearch.md" },
  ] },
  { "Reference" = [
    { "Interfaces" = "interfaces.md" },
    { "Schemas" = "schemas.md" },
    { "Rust Engine Boundary" = "rust-engine-boundary.md" },
    { "Rust Engine Gates" = "rust-engine-gates.md" },
    { "Rust Engine Canonicalization" = "rust-engine-canonicalization.md" },
    { "Rust Engine Semantics" = "decisions/0001-rust-engine-semantics.md" },
    { "De-anonymization Plan" = "de-anonymization-plan.md" },
    { "Benchmark Figure Policy" = "hero-images.md" },
  ] },
  { "Release" = "releasing.md" },
  { "GitHub" = "https://github.com/johnnygreco/nerb" },
]

[project.theme]
language = "en"
font = false
features = [
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.tabs.link",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "teal"
accent = "blue"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "teal"
accent = "cyan"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.validation]
invalid_links = true
invalid_link_anchors = true

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
