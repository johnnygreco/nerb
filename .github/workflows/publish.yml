name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish, such as v0.0.6
        required: true
        type: string

permissions:
  contents: read

env:
  MATURIN_VERSION: v1.11.5

jobs:
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Python
        # actions/setup-python@v6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Set up uv
        # astral-sh/setup-uv@v8.1.0
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Rust
        # dtolnay/rust-toolchain@stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Build source distribution
        run: uv build --sdist --clear

      - name: Verify source distribution
        run: uv run --no-project --with twine twine check --strict dist/*.tar.gz

      - name: Upload source distribution
        # actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-wheels:
    name: Build wheel (${{ matrix.platform.name }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        platform:
          - name: manylinux_2_28_x86_64
            artifact: manylinux-x86_64
            os: ubuntu-latest
            target: x86_64
            versioned_interpreter: true
            manylinux: "2_28"
          - name: macos_universal2
            artifact: macos-universal2
            os: macos-14
            target: universal2-apple-darwin
            versioned_interpreter: false
            manylinux: ""
          - name: windows_x86_64
            artifact: windows-x86_64
            os: windows-latest
            target: x64
            versioned_interpreter: false
            manylinux: ""
    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Python
        # actions/setup-python@v6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        # PyO3/maturin-action@v1.50.0
        uses: PyO3/maturin-action@6fef5d39aef859fecc0e2751d71ea0bb42a6fc78
        with:
          command: build
          args: >-
            --release
            --locked
            --compatibility pypi
            --out dist
            -i ${{ matrix.platform.versioned_interpreter && format('python{0}', matrix.python-version) || 'python' }}
          maturin-version: ${{ env.MATURIN_VERSION }}
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          rust-toolchain: stable

      - name: Upload wheel
        # actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dist-wheel-${{ matrix.platform.artifact }}-cp${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  wheel-install-smoke:
    name: Install wheel (${{ matrix.platform.name }}, Python ${{ matrix.python-version }})
    needs: build-wheels
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        platform:
          - name: manylinux_2_28_x86_64
            artifact: manylinux-x86_64
            os: ubuntu-latest
          - name: macos_universal2_arm64
            artifact: macos-universal2
            os: macos-14
          - name: macos_universal2_x86_64
            artifact: macos-universal2
            os: macos-15-intel
          - name: windows_x86_64
            artifact: windows-x86_64
            os: windows-latest
    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Python
        # actions/setup-python@v6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheel
        # actions/download-artifact@v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dist-wheel-${{ matrix.platform.artifact }}-cp${{ matrix.python-version }}
          path: wheelhouse

      - name: Install produced wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          wheels = sorted(Path("wheelhouse").glob("*.whl"))
          assert len(wheels) == 1, wheels
          subprocess.check_call([
              sys.executable,
              "-m",
              "pip",
              "install",
              str(wheels[0]),
          ])
          PY

      - name: Smoke-test native engine
        shell: bash
        run: |
          python - <<'PY'
          from nerb import Bank

          bank = Bank.from_source_bytes(b'{"CODE":{"Alpha":"Alpha"}}', format_hint="json")
          records = bank.scan_text("Alpha")
          assert records[0]["string"] == "Alpha"
          assert records[0]["offset_unit"] == "byte"
          PY

  publish:
    name: Publish to PyPI
    needs:
      - build-sdist
      - build-wheels
      - wheel-install-smoke
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/nerb/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        # actions/download-artifact@v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Set up Python
        # actions/setup-python@v6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Verify distributions
        run: |
          python -m pip install --upgrade twine
          python -m twine check --strict dist/*

      - name: Publish distributions
        # pypa/gh-action-pypi-publish@release/v1
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist
