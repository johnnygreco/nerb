name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MATURIN_VERSION: v1.11.5

jobs:
  enron-capacity-reader:
    name: Locked Enron capacity reader (Python 3.13)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up Python
        # actions/setup-python@v6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Set up uv
        # astral-sh/setup-uv@v8.1.0
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Rust
        # dtolnay/rust-toolchain@stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Install exact locked capacity reader environment
        run: >-
          uv sync --locked --no-default-groups --group enron-capacity --python 3.13
          --reinstall-package nerb

      - name: Verify reader distribution provenance
        run: |
          uv run --locked --no-default-groups --group enron-capacity --no-sync --python 3.13 python - <<'PY'
          import sys

          from nerb.enron_capacity import _READER_MODULE_PREFIXES, _reader_environment_identity

          def loaded_reader_modules():
              return [
                  name
                  for name in sys.modules
                  if any(name == prefix or name.startswith(prefix + ".") for prefix in _READER_MODULE_PREFIXES)
              ]

          assert loaded_reader_modules() == []
          first = _reader_environment_identity()
          second = _reader_environment_identity()
          assert first == second
          assert loaded_reader_modules() == []
          assert first["datasets_version"] == "5.0.0"
          assert first["datasets_file_count"] > 0
          assert first["datasets_total_bytes"] > 0
          assert first["installed_distribution_count"] > 0
          assert first["datasets_distribution_sha256"].startswith("sha256:")
          assert first["critical_reader_distribution_count"] == 5
          assert first["critical_reader_file_count"] > 0
          assert first["critical_reader_total_bytes"] > 0
          assert first["critical_reader_versions"] == {
              "datasets": "5.0.0",
              "huggingface-hub": "1.23.0",
              "httpx": "0.28.1",
              "fsspec": "2026.4.0",
              "pyarrow": "25.0.0",
          }
          assert first["critical_reader_distribution_sha256"].startswith("sha256:")
          PY

      - name: Smoke-test capacity-only CLI startup
        run: |
          uv run --locked --no-default-groups --group enron-capacity --no-sync --python 3.13 nerb --version
          uv run --locked --no-default-groups --group enron-capacity --no-sync --python 3.13 nerb --help > /dev/null
          uv run --locked --no-default-groups --group enron-capacity --no-sync --python 3.13 \
            python -I -S -B scripts/run_enron_capacity.py run-enron-capacity --help > /dev/null

      - name: Add locked test dependencies
        run: >-
          uv sync --locked --no-default-groups --group dev --group enron-capacity --python 3.13
          --reinstall-package nerb

      - name: Exercise phase-owned reader isolation
        run: |
          NERB_TEST_LOCKED_CAPACITY_LAUNCHER=1 \
            uv run --locked --no-default-groups --group dev --group enron-capacity --no-sync --python 3.13 \
            pytest -q \
            tests/nerb/test_enron_capacity.py::test_reader_network_activity_uses_only_headers_and_nonempty_chunks_and_restores_exactly \
            tests/nerb/test_enron_capacity.py::test_reader_network_activity_fails_closed_on_hook_drift_after_restoring_globals \
            tests/nerb/test_enron_capacity.py::test_reader_network_activity_preserves_header_or_chunk_abort_and_closes_everything \
            tests/nerb/test_enron_capacity.py::test_reader_network_activity_preserves_factory_control_and_restores_exactly \
            tests/nerb/test_enron_capacity.py::test_reader_network_activity_tracks_rotated_clients_and_rejects_factory_drift \
            tests/nerb/test_enron_capacity.py::test_reader_network_activity_rejects_a_transport_close_failure_hidden_by_hub \
            tests/nerb/test_enron_capacity.py::test_reader_network_activity_rejects_response_close_failure_without_masking_cleanup \
            tests/nerb/test_enron_capacity.py::test_reader_provenance_stays_unloaded_until_phase_owned_isolation \
            tests/nerb/test_enron_capacity.py::test_isolated_production_worker_reaches_a_post_identity_gate

  checks:
    name: Checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"
    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          # Aggregate benchmark evidence verifies source blobs from the
          # measured ancestor commit, which must remain locally reachable.
          fetch-depth: 0

      - name: Set up Python
        # actions/setup-python@v6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        # astral-sh/setup-uv@v8.1.0
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Rust
        # dtolnay/rust-toolchain@stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy src/nerb

      - name: ty
        run: uv run ty check

      - name: pytest
        run: uv run pytest

      - name: Rust crate tests
        run: cargo test --locked --manifest-path rust/Cargo.toml

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        # actions/setup-python@v6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Set up uv
        # astral-sh/setup-uv@v8.1.0
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Rust
        # dtolnay/rust-toolchain@stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Build source distribution
        run: uv build --sdist --clear

      - name: Verify source distribution
        run: uv run --no-project --with twine twine check --strict dist/*.tar.gz

      - name: Upload source distribution
        # actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-wheels:
    name: Build wheel (${{ matrix.platform.name }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        platform:
          - name: manylinux_2_28_x86_64
            artifact: manylinux-x86_64
            os: ubuntu-latest
            target: x86_64
            versioned_interpreter: true
            manylinux: "2_28"
          - name: macos_universal2
            artifact: macos-universal2
            os: macos-14
            target: universal2-apple-darwin
            versioned_interpreter: false
            manylinux: ""
          - name: windows_x86_64
            artifact: windows-x86_64
            os: windows-latest
            target: x64
            versioned_interpreter: false
            manylinux: ""
    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        # actions/setup-python@v6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        # PyO3/maturin-action@v1.50.0
        uses: PyO3/maturin-action@6fef5d39aef859fecc0e2751d71ea0bb42a6fc78
        with:
          command: build
          args: >-
            --release
            --locked
            --compatibility pypi
            --out dist
            -i ${{ matrix.platform.versioned_interpreter && format('python{0}', matrix.python-version) || 'python' }}
          maturin-version: ${{ env.MATURIN_VERSION }}
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          rust-toolchain: stable

      - name: Upload wheel
        # actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dist-wheel-${{ matrix.platform.artifact }}-cp${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  wheel-install-smoke:
    name: Install wheel (${{ matrix.platform.name }}, Python ${{ matrix.python-version }})
    needs: build-wheels
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        platform:
          - name: manylinux_2_28_x86_64
            artifact: manylinux-x86_64
            os: ubuntu-latest
          - name: macos_universal2_arm64
            artifact: macos-universal2
            os: macos-14
          - name: macos_universal2_x86_64
            artifact: macos-universal2
            os: macos-15-intel
          - name: windows_x86_64
            artifact: windows-x86_64
            os: windows-latest
    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        # actions/setup-python@v6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheel
        # actions/download-artifact@v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dist-wheel-${{ matrix.platform.artifact }}-cp${{ matrix.python-version }}
          path: wheelhouse

      - name: Install produced wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          wheels = sorted(Path("wheelhouse").glob("*.whl"))
          assert len(wheels) == 1, wheels
          subprocess.check_call([
              sys.executable,
              "-m",
              "pip",
              "install",
              str(wheels[0]),
          ])
          PY

      - name: Smoke-test native engine
        shell: bash
        run: |
          python - <<'PY'
          from nerb import Bank

          bank = Bank.from_source_bytes(b'{"CODE":{"Alpha":"Alpha"}}', format_hint="json")
          records = bank.scan_text("Alpha")
          assert records[0]["string"] == "Alpha"
          assert records[0]["offset_unit"] == "byte"
          PY

      - name: Smoke-test CLI startup
        shell: bash
        run: |
          nerb --version
          nerb --help > /dev/null

  build:
    name: Build package
    needs:
      - build-sdist
      - build-wheels
      - wheel-install-smoke
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check build matrix result
        run: |
          test "${{ needs.build-sdist.result }}" = "success"
          test "${{ needs.build-wheels.result }}" = "success"
          test "${{ needs.wheel-install-smoke.result }}" = "success"
