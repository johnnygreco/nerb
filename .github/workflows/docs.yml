name: Documentation

on:
  pull_request:
    branches:
      - main
    paths:
      - zensical.toml
      - docs/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/docs.yml
  push:
    branches:
      - main
    paths:
      - zensical.toml
      - docs/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/docs.yml
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy, such as main or v0.0.x.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Python
        # actions/setup-python@v6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Set up uv
        # astral-sh/setup-uv@v8.1.0
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install documentation dependencies
        run: uv sync --locked --only-group dev --no-install-project

      - name: Build documentation
        run: uv run --locked --only-group dev zensical build --clean --strict

      - name: Upload static site artifact
        # actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: documentation-site
          path: site
          if-no-files-found: error

  deploy:
    name: Deploy GitHub Pages
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'release' && github.event.release.prerelease == false)
      }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Configure Pages
        # actions/configure-pages@v6
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: Download static site artifact
        # actions/download-artifact@v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: documentation-site
          path: site

      - name: Upload Pages artifact
        # actions/upload-pages-artifact@v5
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: site

      - name: Deploy Pages
        id: deployment
        # actions/deploy-pages@v5
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
