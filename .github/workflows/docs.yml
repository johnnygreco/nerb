name: Documentation

on:
  pull_request:
    branches:
      - main
    paths:
      - zensical.toml
      - docs/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/docs.yml
  push:
    branches:
      - main
    paths:
      - zensical.toml
      - docs/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/docs.yml
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install documentation dependencies
        run: uv sync --locked --only-group dev --no-install-project

      - name: Build documentation
        run: uv run --locked --only-group dev zensical build --clean --strict

      - name: Upload static site artifact
        uses: actions/upload-artifact@v7
        with:
          name: documentation-site
          path: site
          if-no-files-found: error

  deploy:
    name: Deploy GitHub Pages
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'release' && github.event.release.prerelease == false)
      }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Download static site artifact
        uses: actions/download-artifact@v8
        with:
          name: documentation-site
          path: site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
