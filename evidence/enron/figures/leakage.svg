<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 368" role="img" aria-labelledby="title desc"><title id="title">Independent audit: leakage and over-redaction</title><desc id="desc">Lower is better; gold lines mark maximum allowed rates.</desc><rect width="100%" height="100%" fill="#0b1020"/><style>text{font-family:ui-sans-serif,system-ui,sans-serif;fill:#e8eefc}.title{font-size:25px;font-weight:700}.sub{font-size:14px;fill:#aebbd4}.label{font-size:15px}.value{font-size:14px;font-weight:700}.axis{stroke:#53617d;stroke-width:1}.threshold{stroke:#f7c948;stroke-width:3}</style><text class="title" x="34" y="38">Independent audit: leakage and over-redaction</text><text class="sub" x="34" y="64">Lower is better; gold lines mark maximum allowed rates.</text><line class="axis" x1="260" y1="88" x2="880" y2="88"/><text class="label" x="34" y="130">Document leakage</text><rect x="260" y="108" width="620" height="28" rx="5" fill="#202a42"/><rect x="260" y="108" width="557" height="28" rx="5" fill="#f05b67"/><text class="value" x="874" y="128" text-anchor="end">89.86%</text><line class="threshold" x1="291" y1="104" x2="291" y2="140"/><text class="label" x="34" y="192">Sensitive-character leakage</text><rect x="260" y="170" width="620" height="28" rx="5" fill="#202a42"/><rect x="260" y="170" width="488" height="28" rx="5" fill="#f05b67"/><text class="value" x="874" y="190" text-anchor="end">78.66%</text><line class="threshold" x1="272" y1="166" x2="272" y2="202"/><text class="label" x="34" y="254">Negative false alarms</text><rect x="260" y="232" width="620" height="28" rx="5" fill="#202a42"/><rect x="260" y="232" width="1" height="28" rx="5" fill="#29c7a9"/><text class="value" x="874" y="252" text-anchor="end">0.00%</text><line class="threshold" x1="570" y1="228" x2="570" y2="264"/><text class="label" x="34" y="316">Over-redaction</text><rect x="260" y="294" width="620" height="28" rx="5" fill="#202a42"/><rect x="260" y="294" width="1" height="28" rx="5" fill="#29c7a9"/><text class="value" x="874" y="314" text-anchor="end">0.04%</text><line class="threshold" x1="291" y1="290" x2="291" y2="326"/></svg>
