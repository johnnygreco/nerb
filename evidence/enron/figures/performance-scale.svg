<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 368" role="img" aria-labelledby="title desc"><title id="title">Direct scan throughput by bank size</title><desc id="desc">Apple M4, 100-document controlled input; bars are normalized to the fastest cell. 1,000 patterns: 932,401 documents per second, 100.00% of the fastest measured cell; no threshold; diagnostic result. 10,000 patterns: 53,300 documents per second, 5.72% of the fastest measured cell; no threshold; diagnostic result. 25,000 patterns: 26,715 documents per second, 2.87% of the fastest measured cell; no threshold; diagnostic result. 100,000 patterns: 6,811 documents per second, 0.73% of the fastest measured cell; no threshold; diagnostic result.</desc><rect width="100%" height="100%" fill="#0b1020"/><style>text{font-family:ui-sans-serif,system-ui,sans-serif;fill:#e8eefc}.title{font-size:25px;font-weight:700}.sub{font-size:14px;fill:#aebbd4}.label{font-size:15px}.value{font-size:14px;font-weight:700}.value-bg{fill:#0b1020;stroke:#53617d;stroke-width:1}.axis{stroke:#53617d;stroke-width:1}.threshold{stroke:#f7c948;stroke-width:3}</style><text class="title" x="34" y="38">Direct scan throughput by bank size</text><text class="sub" x="34" y="64">Apple M4, 100-document controlled input; bars are normalized to the fastest cell.</text><line class="axis" x1="260" y1="88" x2="760" y2="88"/><text class="label" x="34" y="130">1,000 patterns</text><rect x="260" y="108" width="500" height="28" rx="5" fill="#202a42"/><rect x="260" y="108" width="500" height="28" rx="5" fill="#29c7a9"/><rect class="value-bg" x="778" y="108" width="150" height="28" rx="5"/><text class="value" x="921" y="128" text-anchor="end">932,401 docs/s</text><text class="label" x="34" y="192">10,000 patterns</text><rect x="260" y="170" width="500" height="28" rx="5" fill="#202a42"/><rect x="260" y="170" width="29" height="28" rx="5" fill="#29c7a9"/><rect class="value-bg" x="778" y="170" width="150" height="28" rx="5"/><text class="value" x="921" y="190" text-anchor="end">53,300 docs/s</text><text class="label" x="34" y="254">25,000 patterns</text><rect x="260" y="232" width="500" height="28" rx="5" fill="#202a42"/><rect x="260" y="232" width="14" height="28" rx="5" fill="#29c7a9"/><rect class="value-bg" x="778" y="232" width="150" height="28" rx="5"/><text class="value" x="921" y="252" text-anchor="end">26,715 docs/s</text><text class="label" x="34" y="316">100,000 patterns</text><rect x="260" y="294" width="500" height="28" rx="5" fill="#202a42"/><rect x="260" y="294" width="4" height="28" rx="5" fill="#29c7a9"/><rect class="value-bg" x="778" y="294" width="150" height="28" rx="5"/><text class="value" x="921" y="314" text-anchor="end">6,811 docs/s</text></svg>
