<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 376" role="img" aria-labelledby="title desc"><title id="title">Bank coverage decomposition</title><desc id="desc">Gold spans are split into cataloged exact matches, cataloged exact-span misses, and entities outside the bank. Outside-bank spans measure bank construction coverage, not NERB matcher recall.</desc><rect width="100%" height="100%" fill="#0b1020"/><style>text{font-family:ui-sans-serif,system-ui,sans-serif;fill:#e8eefc}.title{font-size:25px;font-weight:700}.sub{font-size:14px;fill:#aebbd4}.label{font-size:15px;font-weight:700}.value{font-size:13px;fill:#cbd6eb}.legend{font-size:13px;fill:#cbd6eb}</style><text class="title" x="34" y="38">Bank coverage decomposition</text><text class="sub" x="34" y="64">Outside-bank spans are a catalog-construction result, not matcher misses.</text><text class="label" x="34" y="110">Combined</text><text class="value" x="260" y="110">142 exact · 4 catalog miss · 1,247 outside bank</text><rect x="260" y="120" width="620" height="24" rx="4" fill="#202a42"/><rect x="260" y="120" width="63" height="24" fill="#29c7a9"/><rect x="323" y="120" width="2" height="24" fill="#f7c948"/><rect x="325" y="120" width="555" height="24" fill="#71819f"/><text class="label" x="34" y="184">Contact</text><text class="value" x="260" y="184">122 exact · 4 catalog miss · 0 outside bank</text><rect x="260" y="194" width="620" height="24" rx="4" fill="#202a42"/><rect x="260" y="194" width="600" height="24" fill="#29c7a9"/><rect x="860" y="194" width="20" height="24" fill="#f7c948"/><text class="label" x="34" y="258">Person</text><text class="value" x="260" y="258">20 exact · 0 catalog miss · 1,247 outside bank</text><rect x="260" y="268" width="620" height="24" rx="4" fill="#202a42"/><rect x="260" y="268" width="10" height="24" fill="#29c7a9"/><rect x="270" y="268" width="610" height="24" fill="#71819f"/><rect x="260" y="332" width="14" height="14" fill="#29c7a9"/><text class="legend" x="282" y="344">cataloged + exact</text><rect x="430" y="332" width="14" height="14" fill="#f7c948"/><text class="legend" x="452" y="344">cataloged exact-span miss</text><rect x="670" y="332" width="14" height="14" fill="#71819f"/><text class="legend" x="692" y="344">outside bank</text></svg>
