<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 368" role="img" aria-labelledby="title desc"><title id="title">Standalone privacy-redaction assessment</title><desc id="desc">This application-level gate includes unknown entities and sits outside NERB&#x27;s known-bank guarantee.</desc><rect width="100%" height="100%" fill="#0b1020"/><style>text{font-family:ui-sans-serif,system-ui,sans-serif;fill:#e8eefc}.title{font-size:25px;font-weight:700}.sub{font-size:14px;fill:#aebbd4}.label{font-size:15px}.value{font-size:14px;font-weight:700}.axis{stroke:#53617d;stroke-width:1}.threshold{stroke:#f7c948;stroke-width:3}</style><text class="title" x="34" y="38">Standalone privacy-redaction assessment</text><text class="sub" x="34" y="64">This application-level gate includes unknown entities and sits outside NERB&#x27;s known-bank guarantee.</text><line class="axis" x1="260" y1="88" x2="880" y2="88"/><text class="label" x="34" y="130">Open-world exact-span recall</text><rect x="260" y="108" width="620" height="28" rx="5" fill="#202a42"/><rect x="260" y="108" width="63" height="28" rx="5" fill="#f05b67"/><text class="value" x="874" y="128" text-anchor="end">10.19%</text><line class="threshold" x1="849" y1="104" x2="849" y2="140"/><text class="label" x="34" y="192">Sensitive-character coverage</text><rect x="260" y="170" width="620" height="28" rx="5" fill="#202a42"/><rect x="260" y="170" width="132" height="28" rx="5" fill="#f05b67"/><text class="value" x="874" y="190" text-anchor="end">21.34%</text><line class="threshold" x1="868" y1="166" x2="868" y2="202"/><text class="label" x="34" y="254">Fully covered documents</text><rect x="260" y="232" width="620" height="28" rx="5" fill="#202a42"/><rect x="260" y="232" width="63" height="28" rx="5" fill="#f05b67"/><text class="value" x="874" y="252" text-anchor="end">7 / 69</text><line class="threshold" x1="849" y1="228" x2="849" y2="264"/><text class="label" x="34" y="316">Precision (diagnostic)</text><rect x="260" y="294" width="620" height="28" rx="5" fill="#202a42"/><rect x="260" y="294" width="591" height="28" rx="5" fill="#65a9ff"/><text class="value" x="874" y="314" text-anchor="end">95.30%</text></svg>
